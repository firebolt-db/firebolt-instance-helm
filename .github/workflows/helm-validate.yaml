---
name: Helm Chart Validation

on:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect helm changes
        id: helm-changes
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED_FILES=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" -- helm/)
          if [ -z "$CHANGED_FILES" ]; then
            echo "helm_changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in helm/ directory"
          else
            echo "helm_changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in helm/:"
            echo "$CHANGED_FILES"
          fi

      - name: Set up Helm
        if: steps.helm-changes.outputs.helm_changed == 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          # Pin to a specific helm v3 patch. `azure/setup-helm`'s version
          # input is matched verbatim against the upstream tarball name
          # (no semver-range support — "v3.x" 404s), and "latest" promoted
          # to v4 once v4 went stable. Helm v4 emits a trailing newline at
          # EOF of `helm template` output that trips yamllint's default
          # `empty-lines.max-end: 0` rule in validate-chart.sh, so we stay
          # on v3 until we've audited the v3-to-v4 behavioural diffs (env
          # library calls, schema validation, templating semantics) and
          # updated the chart accordingly.
          version: "v3.16.3"

      - name: Install yamllint
        if: steps.helm-changes.outputs.helm_changed == 'true'
        run: |
          pip install yamllint

      - name: Run chart validation
        if: steps.helm-changes.outputs.helm_changed == 'true'
        run: |
          ./helm/scripts/validate-chart.sh
