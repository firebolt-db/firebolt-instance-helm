{{- if .Values.gateway.enabled }}
{{- if and (ne .Values.auth.mode "sso") (not .Values.gateway.auth.directAccessSecret) }}
{{- fail "gateway.enabled requires either auth.mode: sso or gateway.auth.directAccessSecret to be set" }}
{{- end }}
{{- if not .Values.gateway.organization.accountId }}
{{- fail "gateway.organization.accountId must be set when gateway.enabled is true — clients pass it as ?account_id=<value>" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fbinstance.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "fbinstance.selectorLabels" . | nindent 6 }}
      firebolt/component: gateway
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/gateway-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "fbinstance.podLabels" . | nindent 8 }}
        firebolt/component: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag | default .Values.version }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config=/etc/core-gateway.yaml
          env:
            - name: FIREBOLT_ORGANIZATION_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: http-query
              containerPort: 3473
              protocol: TCP
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http-query
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http-query
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/core-gateway.yaml
              subPath: core-gateway.yaml
              readOnly: true
      volumes:
        - name: gateway-config
          configMap:
            name: {{ include "fbinstance.fullname" . }}-gateway
            items:
              - key: core-gateway.yaml
                path: core-gateway.yaml
{{- end }}
