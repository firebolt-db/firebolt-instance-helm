{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fbinstance.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "fbinstance.selectorLabels" . | nindent 6 }}
      firebolt/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/gateway-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "fbinstance.podLabels" . | nindent 8 }}
        firebolt/component: gateway
    spec:
      # 15s = 8s preStop /healthcheck/fail propagation + ~7s Envoy drain budget.
      terminationGracePeriodSeconds: 15
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: envoy
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - envoy
            - -c
            - /etc/envoy/envoy.yaml
          ports:
            - name: http
              containerPort: {{ .Values.gateway.containerPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.gateway.metricsPort }}
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                # Flip Envoy's health filter to 503 via /dev/tcp (no curl in the
                # image), then sleep so Cilium drops the pod from Service
                # endpoints before SIGTERM. New SYNs stop landing here while
                # in-flight streams keep draining.
                command:
                  - bash
                  - -c
                  - |
                    exec 3<>/dev/tcp/127.0.0.1/{{ .Values.gateway.adminPort }}
                    printf 'POST /healthcheck/fail HTTP/1.1\r\nHost: localhost\r\nContent-Length: 0\r\nConnection: close\r\n\r\n' >&3
                    cat <&3 >/dev/null
                    exec 3<&- 3>&-
                    sleep 8
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            # ~4s worst-case detection (period × failureThreshold) fits inside
            # the 8s preStop window while still requiring two consecutive bad
            # probes so a single hiccup does not flap the pod out of Service.
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            runAsUser: 101
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/envoy
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: gateway-config
          configMap:
            name: {{ include "fbinstance.fullname" . }}-gateway
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: tmp
          emptyDir: {}
{{- end }}
