{{- /*
Secret names for gateway/engine TLS, resolved once up front (both are
instance-wide, not per-replica).
*/ -}}
{{- $gatewayTlsSecret := "" -}}
{{- if .Values.tls.gateway.enabled -}}
{{-   $gatewayTlsSecret = include "fbinstance.secretSourceName" (dict "source" .Values.tls.gateway "certManagerSecretName" (printf "%s-tls-gateway" (include "fbinstance.fullname" .)) "context" "tls.gateway") -}}
{{- end -}}
{{- $engineCaSecret := "" -}}
{{- if .Values.tls.engine.enabled -}}
{{-   $engineCaSecret = include "fbinstance.secretSourceName" (dict "source" .Values.tls.engine "certManagerSecretName" (printf "%s-tls-engine" (include "fbinstance.fullname" .)) "context" "tls.engine") -}}
{{- end -}}
{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fbinstance.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "fbinstance.selectorLabels" . | nindent 6 }}
      firebolt/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/gateway-configmap.yaml") . | sha256sum }}
        {{- /*
        See the equivalent comment in engine-statefulset.yaml: these Secrets
        live outside chart-rendered templates, so `lookup` their live content
        rather than hashing a rendered template.
        */}}
        {{- if .Values.tls.gateway.enabled }}
        checksum/tls-gateway: {{ (lookup "v1" "Secret" .Release.Namespace $gatewayTlsSecret).data | toYaml | sha256sum }}
        {{- end }}
        {{- if .Values.tls.engine.enabled }}
        checksum/tls-engine-ca: {{ (lookup "v1" "Secret" .Release.Namespace $engineCaSecret).data | toYaml | sha256sum }}
        {{- end }}
        {{- with .Values.gateway.podTemplate.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fbinstance.podLabels" . | nindent 8 }}
        firebolt/component: gateway
        {{- $reserved := list "firebolt/component" "app.kubernetes.io/name" "app.kubernetes.io/instance" "app.kubernetes.io/managed-by" }}
        {{- range $k, $v := .Values.gateway.podTemplate.extraPodLabels }}
        {{- if not (has $k $reserved) }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
        {{- end }}
    spec:
      # See the equivalent comment in engine-statefulset.yaml: kill legacy
      # service-link env injection, DNS is the only service-discovery
      # channel needed.
      enableServiceLinks: false
      # 15s = 8s preStop /healthcheck/fail propagation + ~7s Envoy drain budget.
      terminationGracePeriodSeconds: 15
      {{- with .Values.gateway.podTemplate.serviceAccountName }}
      serviceAccountName: {{ . }}
      {{- end }}
      {{- with .Values.gateway.podTemplate.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.podTemplate.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.podTemplate.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.podTemplate.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.podTemplate.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.podTemplate.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with (concat .Values.imagePullSecrets .Values.gateway.podTemplate.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.podTemplate.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: envoy
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - envoy
            - -c
            - /etc/envoy/envoy.yaml
          ports:
            - name: http
              containerPort: {{ .Values.gateway.containerPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.gateway.metricsPort }}
              protocol: TCP
          lifecycle:
            {{- if .Values.gateway.podTemplate.lifecycle }}
            {{- toYaml .Values.gateway.podTemplate.lifecycle | nindent 12 }}
            {{- else }}
            preStop:
              exec:
                # Flip Envoy's health filter to 503 via /dev/tcp (no curl in the
                # image), then sleep so Cilium drops the pod from Service
                # endpoints before SIGTERM. New SYNs stop landing here while
                # in-flight streams keep draining.
                command:
                  - bash
                  - -c
                  - |
                    exec 3<>/dev/tcp/127.0.0.1/{{ .Values.gateway.adminPort }}
                    printf 'POST /healthcheck/fail HTTP/1.1\r\nHost: localhost\r\nContent-Length: 0\r\nConnection: close\r\n\r\n' >&3
                    cat <&3 >/dev/null
                    exec 3<&- 3>&-
                    sleep 8
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              {{- if .Values.tls.gateway.enabled }}
              # kubelet HTTPS probes don't verify the server certificate
              # chain, so a self-signed/internal-CA cert needs no extra
              # trust configuration here.
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 1
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              {{- if .Values.tls.gateway.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 1
            # ~4s worst-case detection (period × failureThreshold) fits inside
            # the 8s preStop window while still requiring two consecutive bad
            # probes so a single hiccup does not flap the pod out of Service.
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            {{- if .Values.gateway.podTemplate.securityContext }}
            {{- toYaml .Values.gateway.podTemplate.securityContext | nindent 12 }}
            {{- else }}
            runAsUser: 101
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            {{- end }}
          {{- with .Values.gateway.podTemplate.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/envoy
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.tls.gateway.enabled }}
            - name: gateway-tls
              mountPath: /etc/envoy/tls/gateway
              readOnly: true
            {{- end }}
            {{- if .Values.tls.engine.enabled }}
            - name: engine-ca
              mountPath: /etc/envoy/tls/engine-ca
              readOnly: true
            {{- end }}
          {{- with .Values.gateway.podTemplate.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.gateway.podTemplate.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: gateway-config
          configMap:
            name: {{ include "fbinstance.fullname" . }}-gateway
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: tmp
          emptyDir: {}
        {{- if .Values.tls.gateway.enabled }}
        - name: gateway-tls
          secret:
            secretName: {{ $gatewayTlsSecret }}
        {{- end }}
        {{- if .Values.tls.engine.enabled }}
        - name: engine-ca
          secret:
            secretName: {{ $engineCaSecret }}
        {{- end }}
        {{- with .Values.gateway.podTemplate.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
