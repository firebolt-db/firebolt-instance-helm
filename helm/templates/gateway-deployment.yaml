{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fbinstance.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "fbinstance.selectorLabels" . | nindent 6 }}
      firebolt/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/gateway-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "fbinstance.podLabels" . | nindent 8 }}
        firebolt/component: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: envoy
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - envoy
            - -c
            - /etc/envoy/envoy.yaml
          ports:
            - name: http
              containerPort: {{ .Values.gateway.containerPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 3
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            runAsUser: 101
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/envoy
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: gateway-config
          configMap:
            name: {{ include "fbinstance.fullname" . }}-gateway
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: tmp
          emptyDir: {}
{{- end }}
