apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fbinstance.fullname" . }}-pensieve-dedicated
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: pensieve-dedicated
data:
  config.xml: |
    <?xml version="1.0"?>
    <config>
      <pensieve_lite>
        <host>{{ .Values.metadata.server.host }}</host>
        <port>{{ .Values.metadata.server.port }}</port>
        <server_threads>{{ .Values.metadata.server.threads }}</server_threads>
        <log_level>{{ .Values.metadata.server.log_level }}</log_level>
        <metadata_storage>
          <postgresql>
            <!-- Connection settings (non-sensitive) -->
            {{- if .Values.postgresql.enabled }}
            <host>{{ printf "%s-postgresql" .Release.Name }}</host>
            <database>{{ .Values.postgresql.auth.database }}</database>
            {{- else }}
            <host>{{ .Values.metadata.postgresql.host }}</host>
            <database>{{ .Values.metadata.postgresql.database }}</database>
            {{- end }}
            <port>{{ .Values.metadata.postgresql.port }}</port>
            <schema>{{ .Values.metadata.postgresql.schema }}</schema>

            <!-- Credentials are provided via POSTGRES_USERNAME_FILE / POSTGRES_PASSWORD_FILE -->
            <!-- pointing to files mounted from a Secret -->

            <!-- Connection tuning -->
            <keepalive>
              <enabled>{{ .Values.metadata.postgresql.keepalive.enabled }}</enabled>
              <idle_sec>{{ .Values.metadata.postgresql.keepalive.idle_sec }}</idle_sec>
              <interval_sec>{{ .Values.metadata.postgresql.keepalive.interval_sec }}</interval_sec>
              <count>{{ .Values.metadata.postgresql.keepalive.count }}</count>
            </keepalive>
            <connect_timeout_sec>{{ .Values.metadata.postgresql.connect_timeout_sec }}</connect_timeout_sec>
          </postgresql>
          <garbage_collection>
            <enabled>true</enabled>
            <interval_seconds>3600</interval_seconds>
            <max_age_seconds>86400</max_age_seconds>
          </garbage_collection>
        </metadata_storage>
      </pensieve_lite>
    </config>
