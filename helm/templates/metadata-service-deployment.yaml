{{- $pgSecretName := .Values.postgresql.credentials.existingSecret | default (printf "%s-metadata-postgres-creds" (include "fbinstance.fullname" .)) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fbinstance.fullname" . }}-metadata-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: metadata-service
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fbinstance.selectorLabels" . | nindent 6 }}
      firebolt/component: metadata-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml .Values.metadata.server | sha256sum }}
        checksum/secret: {{ toYaml .Values.postgresql | sha256sum }}
      labels:
        {{- include "fbinstance.podLabels" . | nindent 8 }}
        firebolt/component: metadata-service
        {{- with .Values.metadata.podTemplate.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      # See the equivalent comment in engine-statefulset.yaml: kill legacy
      # service-link env injection. Pensieve is a Quarkus app and maps env
      # vars to MicroProfile config keys, so the auto-injected vars are
      # actively dangerous here (cf. floci's FLOCI_PORT collision).
      enableServiceLinks: false
      # Pensieve never calls the Kubernetes API.
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.metadata.deployment.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1111
        runAsGroup: 1111
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.metadata.podTemplate.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metadata.podTemplate.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metadata.podTemplate.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: metadata-service
          image: "{{ .Values.metadata.image.repository }}:{{ default .Chart.AppVersion .Values.metadata.image.tag }}"
          imagePullPolicy: {{ .Values.metadata.image.pullPolicy }}
          command: ["/dedicated-pensieve", "--config", "/configs/config.xml"]
          ports:
            - name: grpc
              containerPort: {{ .Values.metadata.server.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: {{ .Values.metadata.server.port }}
              service: ""
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /configs
              readOnly: true
            - name: postgres-creds
              mountPath: {{ .Values.postgresql.credentials.mountPath }}
              readOnly: true
            # Scratch space outside the read-only root filesystem.
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.metadata.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1111
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: POSTGRES_USERNAME_FILE
              value: {{ .Values.postgresql.credentials.mountPath }}/username
            - name: POSTGRES_PASSWORD_FILE
              value: {{ .Values.postgresql.credentials.mountPath }}/password
          {{- with .Values.metadata.podTemplate.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "fbinstance.fullname" . }}-metadata-service
        - name: postgres-creds
          secret:
            secretName: {{ $pgSecretName }}
        - name: tmp
          emptyDir: {}
