apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-auth-configmap
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  volumes:
    - name: auth-config
      configMap:
        name: {{ include "fbinstance.fullname" . }}-auth
  containers:
    - name: check
      image: busybox:stable
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" . | nindent 10 }}
          FILE="/auth/auth.json"
          log "Auth ConfigMap ($FILE)"
          [ -s "$FILE" ] || fail "auth.json missing or empty"
          grep -q '"mode"' "$FILE" || fail "missing mode key"
          grep -q '"mode": "{{ .Values.auth.mode }}"' "$FILE" \
            || fail "mode mismatch, expected {{ .Values.auth.mode }}"
          pass "auth.json mode={{ .Values.auth.mode }}"
      volumeMounts:
        - name: auth-config
          mountPath: /auth
