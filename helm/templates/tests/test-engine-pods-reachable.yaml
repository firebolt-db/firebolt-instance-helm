apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-engine-pods
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: busybox:stable
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" $ | nindent 10 }}
          {{- range $engine := .Values.engines }}
          {{- range $i := until (int $engine.replicas) }}
          HOST="{{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-node-{{ $i }}-0.{{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-hl.{{ $.Release.Namespace }}.svc.cluster.local"
          log "Reachability: engine {{ $engine.name }} node-{{ $i }} ($HOST:8122)"
          nc -z -w 5 "$HOST" 8122 || fail "{{ $engine.name }} node-{{ $i }} health port unreachable"
          pass "{{ $engine.name }} node-{{ $i }} health port reachable"
          {{- end }}
          {{- end }}
