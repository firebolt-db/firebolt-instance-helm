apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-engine-pods
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: busybox:stable
      command:
        - sh
        - -c
        - |
          set -e
          {{- range .Values.engines }}
          echo "Probing {{ include "fbinstance.fullname" $ }}-engine-{{ .name }}-0 ..."
          nc -z -w 5 \
            {{ include "fbinstance.fullname" $ }}-engine-{{ .name }}-0.{{ include "fbinstance.fullname" $ }}-engine-{{ .name }}-hl.{{ $.Release.Namespace }}.svc.cluster.local \
            8122
          echo "PASS: {{ .name }} pod-0 health port reachable"
          {{- end }}
