apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-engine-count
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "fbinstance.fullname" . }}-test
  containers:
    - name: check
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          EXPECTED={{ len .Values.engines }}
          ACTUAL=$(kubectl get statefulsets -n {{ .Release.Namespace }} \
            -l app.kubernetes.io/instance={{ .Release.Name }},firebolt/component=engine \
            --no-headers 2>/dev/null | wc -l)
          echo "Expected StatefulSets: $EXPECTED, Found: $ACTUAL"
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "FAIL: StatefulSet count mismatch"
            exit 1
          fi
          echo "PASS"
