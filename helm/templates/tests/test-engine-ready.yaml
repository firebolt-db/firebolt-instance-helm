apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-engine-ready
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" $ | nindent 10 }}
          {{- range $engine := .Values.engines }}
          {{- range $i := until (int $engine.replicas) }}
          HOST="{{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-node-{{ $i }}-0.{{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-hl.{{ $.Release.Namespace }}.svc.cluster.local"
          log "Readiness: engine {{ $engine.name }} node-{{ $i }} (GET http://$HOST:8122/health/ready)"
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            --retry 12 --retry-delay 5 --retry-connrefused \
            "http://${HOST}:8122/health/ready")
          [ "$HTTP_CODE" = "200" ] \
            || fail "{{ $engine.name }} node-{{ $i }} /health/ready returned HTTP $HTTP_CODE (expected 200)"
          pass "{{ $engine.name }} node-{{ $i }} is ready"
          {{- end }}
          {{- end }}
