{{- if .Values.gateway.enabled }}
{{- range $engine := .Values.engines }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" $ }}-test-sql-query-{{ $engine.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" $ | nindent 4 }}
    firebolt/engine: {{ $engine.name }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" $ | nindent 10 }}
          GW="http://{{ include "fbinstance.fullname" $ }}-gateway.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.gateway.service.port }}"
          ENGINE="{{ $engine.name }}"
          log "SQL: SELECT 1 via gateway (engine: $ENGINE)"
          RESPONSE=$(curl --fail --silent \
            --retry 10 --retry-delay 5 --retry-connrefused \
            --max-time 30 \
            -X POST "$GW/" \
            -H "X-Firebolt-Engine: $ENGINE" \
            -H "Content-Type: text/plain" \
            --data "SELECT 1")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "1" || fail "unexpected response from gateway"
          pass "SELECT 1 returned a result containing '1'"
{{- end }}
{{- end }}
