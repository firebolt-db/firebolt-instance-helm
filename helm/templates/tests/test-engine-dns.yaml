apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-engine-dns
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: busybox:stable
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" $ | nindent 10 }}
          {{- range $engine := .Values.engines }}
          {{- range $i := until (int $engine.replicas) }}
          FQDN="{{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-node-{{ $i }}-0.{{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-hl.{{ $.Release.Namespace }}.svc.cluster.local"
          log "DNS: engine {{ $engine.name }} node-{{ $i }}"
          nslookup "$FQDN" >/dev/null 2>&1 || fail "$FQDN did not resolve"
          pass "{{ $engine.name }} node-{{ $i }} DNS resolves"
          {{- end }}
          {{- end }}
