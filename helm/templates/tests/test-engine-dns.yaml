apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-engine-dns
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: busybox:stable
      command:
        - sh
        - -c
        - |
          set -e
          {{- range .Values.engines }}
          FQDN="{{ include "fbinstance.fullname" $ }}-engine-{{ .name }}-0.{{ include "fbinstance.fullname" $ }}-engine-{{ .name }}-hl.{{ $.Release.Namespace }}.svc.cluster.local"
          echo "Resolving $FQDN ..."
          nslookup "$FQDN"
          echo "PASS: {{ .name }} pod-0 DNS resolves"
          {{- end }}
