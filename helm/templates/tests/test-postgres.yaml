{{- if .Values.postgresql.local_enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-postgres
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: postgres:16
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" . | nindent 10 }}
          HOST="{{ include "fbinstance.fullname" . }}-metadata-pg.{{ .Release.Namespace }}.svc.cluster.local"
          log "PostgreSQL readiness (pg_isready $HOST:5432)"
          pg_isready -h "$HOST" -p 5432 -U {{ .Values.postgresql.username }} -d {{ .Values.postgresql.database }} \
            || fail "PostgreSQL not ready"
          pass "PostgreSQL is accepting connections"
{{- end }}
