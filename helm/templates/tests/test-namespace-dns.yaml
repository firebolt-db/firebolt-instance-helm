apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-namespace-dns
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: busybox:stable
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" . | nindent 10 }}
          SVC="{{ include "fbinstance.fullname" . }}-gateway.{{ .Release.Namespace }}.svc.cluster.local"
          log "DNS: $SVC"
          nslookup "$SVC" >/dev/null 2>&1 \
            || fail "DNS resolution failed — namespace may not exist or DNS is broken"
          pass "namespace DNS resolves"
