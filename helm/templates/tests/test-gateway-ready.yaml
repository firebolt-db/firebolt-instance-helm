{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-gateway-ready
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" . | nindent 10 }}
          URL="http://{{ include "fbinstance.fullname" . }}-gateway.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.gateway.service.port }}/healthz"
          log "Gateway readiness (GET $URL)"
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --retry 5 --retry-delay 3 --retry-connrefused "$URL")
          [ "$HTTP_CODE" = "200" ] || fail "expected HTTP 200 but got $HTTP_CODE"
          pass "gateway is healthy"
{{- end }}
