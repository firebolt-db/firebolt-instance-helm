{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-gateway-ready
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          URL="http://{{ include "fbinstance.fullname" . }}-gateway.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.gateway.service.port }}/healthz"
          echo "GET $URL (expecting 200) ..."
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --retry 5 --retry-delay 3 --retry-connrefused "$URL")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "PASS: gateway is healthy"
          else
            echo "FAIL: expected HTTP 200 but got $HTTP_CODE"
            exit 1
          fi
{{- end }}
