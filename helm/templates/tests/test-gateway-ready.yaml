{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-gateway-ready
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          URL="http://{{ include "fbinstance.fullname" . }}-gateway.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.gateway.service.port }}/ready"
          echo "GET $URL ..."
          curl --fail --retry 5 --retry-delay 3 --retry-connrefused "$URL" \
            && echo "PASS: gateway is ready" \
            || { echo "FAIL: gateway health check failed"; exit 1; }
{{- end }}
