apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-no-engine-deployments
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "fbinstance.fullname" . }}-test
  containers:
    - name: check
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          COUNT=$(kubectl get deployments -n {{ .Release.Namespace }} \
            -l app.kubernetes.io/instance={{ .Release.Name }},firebolt/component=engine \
            --no-headers 2>/dev/null | wc -l)
          echo "Engine Deployments found: $COUNT"
          if [ "$COUNT" -ne 0 ]; then
            echo "FAIL: expected 0 engine Deployments, found $COUNT"
            exit 1
          fi
          echo "PASS: no engine Deployments exist"
