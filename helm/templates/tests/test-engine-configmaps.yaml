apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-engine-configmaps
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  volumes:
    {{- range .Values.engines }}
    - name: config-{{ .name }}
      configMap:
        name: {{ include "fbinstance.fullname" $ }}-engine-{{ .name }}-config
    {{- end }}
  containers:
    - name: check
      image: busybox:stable
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" $ | nindent 10 }}
          {{- range .Values.engines }}
          FILE="/configs/{{ .name }}/config.yaml"
          log "Engine {{ .name }} config.yaml"
          [ -s "$FILE" ] || fail "$FILE is missing or empty"
          grep -q '^schema_version:' "$FILE"   || fail "missing schema_version key"
          grep -q '^engine:' "$FILE"           || fail "missing engine block"
          grep -q '^instance:' "$FILE"         || fail "missing instance block"
          grep -q 'metadata_endpoint:' "$FILE" || fail "missing metadata_endpoint key"
          pass "{{ .name }} config.yaml is valid"
          {{- end }}
      volumeMounts:
        {{- range .Values.engines }}
        - name: config-{{ .name }}
          mountPath: /configs/{{ .name }}
        {{- end }}
