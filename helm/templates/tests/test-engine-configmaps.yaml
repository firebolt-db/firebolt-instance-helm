apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fbinstance.fullname" . }}-test-engine-configmaps
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  volumes:
    {{- range .Values.engines }}
    - name: config-{{ .name }}
      configMap:
        name: {{ include "fbinstance.fullname" $ }}-engine-{{ .name }}-config
    {{- end }}
  containers:
    - name: check
      image: busybox:stable
      command:
        - sh
        - -c
        - |
          set -e
          {{- include "fbinstance.testShellHelpers" $ | nindent 10 }}
          {{- range .Values.engines }}
          FILE="/configs/{{ .name }}/config.json"
          log "Engine {{ .name }} config.json"
          [ -s "$FILE" ] || fail "$FILE is missing or empty"
          grep -q '"nodes"' "$FILE"                || fail "missing nodes key"
          grep -q '"multi_engine_endpoint"' "$FILE" || fail "missing multi_engine_endpoint key"
          pass "{{ .name }} config.json is valid"
          {{- end }}
      volumeMounts:
        {{- range .Values.engines }}
        - name: config-{{ .name }}
          mountPath: /configs/{{ .name }}
        {{- end }}
