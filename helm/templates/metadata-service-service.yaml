apiVersion: v1
kind: Service
metadata:
  name: {{ include "fbinstance.fullname" . }}-metadata-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: metadata-service
spec:
  type: ClusterIP
  selector:
    {{- include "fbinstance.selectorLabels" . | nindent 4 }}
    firebolt/component: metadata-service
  ports:
    - name: grpc
      port: {{ .Values.metadata.server.port }}
      targetPort: grpc
      protocol: TCP
