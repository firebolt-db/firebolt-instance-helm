{{- $pgSecretName := "" }}
{{- if .Values.postgresql.enabled }}
{{-   $pgSecretName = printf "%s-pensieve-postgres-creds" (include "fbinstance.fullname" .) }}
{{- else }}
{{-   $pgSecretName = .Values.metadata.postgresql.credentials.existingSecret | default (printf "%s-pensieve-postgres-creds" (include "fbinstance.fullname" .)) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fbinstance.fullname" . }}-pensieve-dedicated
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: pensieve-dedicated
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fbinstance.selectorLabels" . | nindent 6 }}
      firebolt/component: pensieve-dedicated
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml .Values.metadata.server | sha256sum }}
        checksum/secret: {{ toYaml .Values.metadata.postgresql | sha256sum }}
      labels:
        {{- include "fbinstance.podLabels" . | nindent 8 }}
        firebolt/component: pensieve-dedicated
        {{- with .Values.metadata.podTemplate.extraPodLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.metadata.deployment.terminationGracePeriodSeconds }}
      {{- with .Values.metadata.podTemplate.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metadata.podTemplate.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metadata.podTemplate.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:stable
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ printf "%s-postgresql" .Release.Name }}:5432 ..."
              until nc -z {{ printf "%s-postgresql" .Release.Name }} 5432; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready."
      {{- end }}
      containers:
        - name: pensieve-dedicated
          image: "{{ .Values.metadata.image.repository }}:{{ .Values.metadata.image.tag }}"
          imagePullPolicy: {{ .Values.engineSpec.image.pullPolicy }}
          command: ["/dedicated-pensieve", "--config", "/configs/config.xml"]
          ports:
            - name: grpc
              containerPort: {{ .Values.metadata.server.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /configs
              readOnly: true
            - name: postgres-creds
              mountPath: {{ .Values.metadata.postgresql.credentials.mountPath }}
              readOnly: true
          resources:
            {{- toYaml .Values.metadata.resources | nindent 12 }}
          {{- with .Values.metadata.deployment.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: POSTGRES_USERNAME_FILE
              value: {{ .Values.metadata.postgresql.credentials.mountPath }}/username
            - name: POSTGRES_PASSWORD_FILE
              value: {{ .Values.metadata.postgresql.credentials.mountPath }}/password
          {{- with .Values.metadata.podTemplate.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "fbinstance.fullname" . }}-pensieve-dedicated
        - name: postgres-creds
          secret:
            secretName: {{ $pgSecretName }}
