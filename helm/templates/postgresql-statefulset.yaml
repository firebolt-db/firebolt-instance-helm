{{- if .Values.postgresql.local_enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "fbinstance.fullname" . }}-metadata-pg
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: metadata-pg
spec:
  replicas: 1
  serviceName: {{ include "fbinstance.fullname" . }}-metadata-pg
  selector:
    matchLabels:
      {{- include "fbinstance.selectorLabels" . | nindent 6 }}
      firebolt/component: metadata-pg
  template:
    metadata:
      labels:
        {{- include "fbinstance.podLabels" . | nindent 8 }}
        firebolt/component: metadata-pg
    spec:
      # See the equivalent comment in engine-statefulset.yaml: kill legacy
      # service-link env injection, DNS is the only service-discovery
      # channel needed.
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp-postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fbinstance.fullname" . }}-metadata-postgres-creds
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fbinstance.fullname" . }}-metadata-postgres-creds
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "fbinstance.fullname" . }}-metadata-postgres-creds
                  key: database
            # A sub-dir of the mounted PVC, created and owned by the postgres
            # process. Required because the kubelet's fsGroup chgrp does not
            # reach into a subPath bind mount, so initdb's chmod 0700 would
            # fail under runAsNonRoot.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Mount the PVC root, not a subPath (see PGDATA above). On-disk data
            # still lives under pgdata/, so existing PVCs migrate cleanly.
            - name: data
              mountPath: /var/lib/postgresql/data
            # Scratch outside the read-only root filesystem: the unix socket and
            # postmaster.pid, and initdb/runtime temp files respectively.
            - name: run-postgresql
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}, "-d", {{ .Values.postgresql.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: run-postgresql
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "fbinstance.podLabels" . | nindent 10 }}
          firebolt/component: metadata-pg
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
{{- end }}
