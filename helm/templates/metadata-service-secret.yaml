{{- if not .Values.postgresql.credentials.existingSecret }}
{{- $secretName := printf "%s-metadata-postgres-creds" (include "fbinstance.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := .Values.postgresql.password }}
{{- if not $password }}
  {{- if and $existingSecret $existingSecret.data }}
    {{- $password = index $existingSecret.data "password" | b64dec }}
  {{- else }}
    {{- $password = randAlphaNum 24 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: metadata-service
type: Opaque
data:
  username: {{ .Values.postgresql.username | b64enc | quote }}
  password: {{ $password | b64enc | quote }}
  database: {{ .Values.postgresql.database | b64enc | quote }}
{{- end }}
