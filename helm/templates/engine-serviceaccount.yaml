{{- if empty .Values.engineSpec.serviceAccount }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fbinstance.engineServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: engine
# Engine pods do not call the Kubernetes API. Suppressing the token
# mount means a code-execution exploit inside the engine cannot use a
# projected SA token to talk to the apiserver at all, even if the SA
# accumulates accidental RBAC later. Setting this on the SA (rather
# than at the pod level) is the more reliable knob: kubelet honours
# it for any pod referencing this SA, regardless of who renders the
# pod template.
#
# Rendered only when `engineSpec.serviceAccount` is empty. A non-empty
# value means the user brings their own SA (e.g. IRSA), and the chart
# does not own its `automountServiceAccountToken` setting.
automountServiceAccountToken: false
{{- end }}
