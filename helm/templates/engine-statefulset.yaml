{{- /*
One 1-replica StatefulSet per engine node — `range $i := until $engine.replicas`
expands `replicas: N` into N independent StatefulSets, each with `replicas: 1`.
The engine binary does not support a single multi-replica StatefulSet here;
the operator-managed deployment handles multi-replica via blue-green
generation rollouts that this chart deliberately does not implement.

Consequence: do NOT add `persistentVolumeClaimRetentionPolicy: { whenDeleted:
Delete, ... }` to align with the operator. The operator's Delete-on-STS-
deletion makes sense for stale generation cleanup; in this chart, an STS is
deleted whenever a user reduces `replicas`, so Delete would silently destroy
the removed node's data PVC. Stick with the K8s default (Retain).
*/ -}}
{{- /*
Secret names for auth/TLS artifacts, resolved once up front: these are shared across
every engine and node (one admin account, one signing-key set, one TLS cert for the
whole instance), not per-node, so there's no reason to recompute them inside the loop.
*/ -}}
{{- $authAdminSecret := "" -}}
{{- $authSigningSecrets := list -}}
{{- if $.Values.auth.enabled -}}
{{-   $authAdminSecret = $.Values.auth.admin.password.existingSecret.secretRef -}}
{{-   range $ki, $key := $.Values.auth.signingKeys -}}
{{-     $authSigningSecrets = append $authSigningSecrets (include "fbinstance.secretSourceName" (dict "source" $key "certManagerSecretName" (include "fbinstance.authSigningKeySecretName" (dict "root" $ "key" $key)) "context" (printf "auth.signingKeys[%d]" $ki))) -}}
{{-   end -}}
{{- end -}}
{{- $engineTlsSecret := "" -}}
{{- if $.Values.tls.engine.enabled -}}
{{-   $engineTlsSecret = include "fbinstance.secretSourceName" (dict "source" $.Values.tls.engine "certManagerSecretName" (printf "%s-tls-engine" (include "fbinstance.fullname" $)) "context" "tls.engine") -}}
{{- end -}}
{{- range .Values.engines }}
{{- $engine := . }}
{{- range $i := until (int $engine.replicas) }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ $.Release.Namespace }}
  name: {{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-node-{{ $i }}
  labels:
    {{- include "fbinstance.labels" $ | nindent 4 }}
    firebolt/component: engine
    firebolt/engine: {{ $engine.name }}
    firebolt/node: {{ $i | quote }}
spec:
  serviceName: {{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-hl
  replicas: 1
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      {{- include "fbinstance.selectorLabels" $ | nindent 6 }}
      firebolt/engine: {{ $engine.name }}
      firebolt/node: {{ $i | quote }}
  template:
    metadata:
      annotations:
        # Roll this engine's pods when its own config.yaml changes. The
        # config hash is scoped to this engine so a change to one engine
        # doesn't restart the others.
        checksum/config: {{ include "fbinstance.engineConfig" (dict "root" $ "engine" $engine) | sha256sum }}
        {{- /*
        These secrets live outside chart-rendered templates (BYO or
        cert-manager-created), so there's no rendered content to hash the
        usual way — `lookup` the live Secret and hash its data instead, so a
        rotated Secret (same name, new content) still rolls the pods. Blank
        during `helm template`/offline `--dry-run` (no cluster access), which
        matches the existing metadata-service-secret.yaml precedent.
        */}}
        {{- if $.Values.auth.enabled }}
        checksum/auth-admin: {{ (lookup "v1" "Secret" $.Release.Namespace $authAdminSecret).data | toYaml | sha256sum }}
        {{- range $ki, $secretName := $authSigningSecrets }}
        checksum/auth-signing-{{ $ki }}: {{ (lookup "v1" "Secret" $.Release.Namespace $secretName).data | toYaml | sha256sum }}
        {{- end }}
        {{- end }}
        {{- if $.Values.tls.engine.enabled }}
        checksum/tls-engine: {{ (lookup "v1" "Secret" $.Release.Namespace $engineTlsSecret).data | toYaml | sha256sum }}
        {{- end }}
        {{- with $engine.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fbinstance.podLabels" $ | nindent 8 }}
        firebolt/component: engine
        firebolt/engine: {{ $engine.name }}
        firebolt/node: {{ $i | quote }}
        {{- $reserved := list "firebolt/component" "firebolt/engine" "firebolt/node" "app.kubernetes.io/name" "app.kubernetes.io/instance" "app.kubernetes.io/managed-by" }}
        {{- range $k, $v := $engine.podLabels }}
        {{- if not (has $k $reserved) }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
        {{- end }}
    spec:
      # Suppress legacy Docker-link env vars (`<SVC>_SERVICE_HOST`,
      # `<SVC>_PORT=tcp://...`, etc.) the kubelet would otherwise inject
      # for every Service in the namespace. DNS is the real service-
      # discovery channel here; the auto-injected vars are dead weight
      # that also risks colliding with firebolt-core's own config keys
      # (the `FIREBOLT_*` prefix is owned by the engine binary).
      enableServiceLinks: false
      {{- if $engine.priorityClassName }}
      priorityClassName: {{ $engine.priorityClassName }}
      {{- end }}
      serviceAccountName: {{ include "fbinstance.engineServiceAccountName" $ }}
      terminationGracePeriodSeconds: {{ $.Values.engineSpec.terminationGracePeriodSeconds }}
      {{- with $.Values.engineSpec.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and $.Values.engineSpec.memlockSetup $.Values.engineSpec.podSecurityContext.runAsNonRoot }}
      shareProcessNamespace: true
      {{- end }}
      {{- with ($engine.tolerations | default $.Values.engineSpec.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($engine.affinity | default $.Values.engineSpec.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($engine.nodeSelector | default $.Values.engineSpec.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($engine.topologySpreadConstraints | default $.Values.engineSpec.topologySpreadConstraints) }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: core
          image: "{{ $.Values.engineSpec.image.repository }}:{{ default $.Chart.AppVersion $.Values.engineSpec.image.tag }}"
          imagePullPolicy: {{ $.Values.engineSpec.image.pullPolicy }}
          env:
            - name: FIREBOLT_CORE_NODE
              value: {{ $i | quote }}
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: NODES_COUNT
              value: {{ $engine.replicas | quote }}
            # Enables the engine's AWS-SDK EC2-metadata client, which is how
            # IRSA credentials are resolved for managed S3 storage.
            - name: FB_AWS_EC2_METADATA_CLIENT_ENABLED
              value: "true"
            # Selects the firebolt-core code path inside the unified
            # `firebolt` binary: the operator-rendered config (config.yaml
            # under --data-dir) is honored as-is and not rewritten at
            # startup.
            - name: FIREBOLT_CORE_MODE
              value: "1"
            {{- with $.Values.engineSpec.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $.Values.engineSpec.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/bash", "-c"]
          tty: true
          stdin: true
          args:
            - |
              REQUIRED_MEMLOCK_BYTES=8589934592 # 8GB
              function get_memlock_limit() {
                cat /proc/self/limits | grep -F 'Max locked memory' | awk '{print $4}'
              }

              function needs_memlock_setup() {
                # Expected: 'unlimited' or a number in bytes.
                local CURRENT_MEMLOCK_VALUE=$(get_memlock_limit)

                if [ "$CURRENT_MEMLOCK_VALUE" = "unlimited" ]; then
                  return 1
                fi
                if [ "$CURRENT_MEMLOCK_VALUE" -ge "$REQUIRED_MEMLOCK_BYTES" ]; then
                  return 1
                fi

                # memlock setup is necessary
                return 0
              }

              echo -n "[Setup] Firebolt Core version "
              firebolt --version

              {{- if $.Values.engineSpec.podSecurityContext.runAsNonRoot }}
              if [[ $(id -u) -eq 0 ]]; then
                echo "[Setup] Core container is running as root, however deployment used podSecurityContext.runAsNonRoot=true" 1>&2
                exit 4
              fi

              {{- if $.Values.engineSpec.memlockSetup }}
              echo "[Setup] Core entrypoint PID: $BASHPID"
              rm -f /var/lib/firebolt/entrypoint-*.pid
              PID_FILE="/var/lib/firebolt/entrypoint-$POD_UID.pid"
              echo "$BASHPID" > "$PID_FILE"
              trap "rm -f $PID_FILE" EXIT

              ## wait until memlock limits are changed by the helper container
              CURRENT_MEMLOCK_VALUE=$(get_memlock_limit)
              echo "[Setup] current soft memlock limit: $CURRENT_MEMLOCK_VALUE (will wait for limits to be upgraded if below 8GB)" 1>&2
              while needs_memlock_setup; do
                sleep 0.2
              done
              {{- end }}
              {{- else }}
              if [[ $(id -u) -ne 0 ]]; then
                echo "[Setup] Core container is not running as root, however deployment used podSecurityContext.runAsNonRoot=false (or unset)" 1>&2
                exit 4
              fi

              {{- if $.Values.engineSpec.memlockSetup }}
              ## NOTE: no 'ulimit' call happens here because root images support is soon to be deprecated
              echo "WARNING: memlockSetup=true is unnecessary when podSecurityContext.runAsNonRoot is false (or unset)" 1>&2
              {{- end }}

              {{- end }}
              echo "[Setup] current memlock limit:" 1>&2
              cat /proc/self/limits | grep -F 'Max locked memory' 1>&2

              rm -f "$PID_FILE"

              exec firebolt server start --data-dir /var/lib/firebolt
          # Intra-engine peer ports (aragog/shufflepuff/storage-manager/
          # storage-agent) are intentionally omitted. ContainerPort entries
          # are informational only — the engine binary opens those
          # listeners regardless — and they are reached via the headless
          # service's pod-IP DNS records, not via a Service port.
          ports:
            - name: http-query
              containerPort: 3473
              protocol: TCP
            - name: health
              containerPort: 8122
              protocol: TCP
            - name: metadata
              containerPort: 6500
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
            httpGet:
              path: /health/live
              port: 8122
          {{- if $.Values.engineSpec.readiness }}
          readinessProbe:
            initialDelaySeconds: 1
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 6
            httpGet:
              path: /health/ready
              port: 8122
          {{- end }}
          startupProbe:
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
            httpGet:
              path: /health/live
              port: 8122
          resources:
            {{- toYaml $engine.resources | nindent 12 }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: data
              mountPath: /var/lib/firebolt
            - name: engine-config
              mountPath: /var/lib/firebolt/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if $.Values.auth.enabled }}
            - name: auth-admin
              mountPath: /secrets/auth/admin
              readOnly: true
            {{- range $ki, $secretName := $authSigningSecrets }}
            - name: auth-signing-{{ $ki }}
              mountPath: /secrets/auth/signing-{{ $ki }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if $.Values.tls.engine.enabled }}
            # engine-tls-raw carries tls.key (read directly as private_key_file)
            # plus tls.crt/ca.crt, which the tls-chain-setup init container
            # combines into engine-tls-chain's fullchain.pem (certificate_file) —
            # see that init container for why the two can't just be one mount.
            - name: engine-tls-raw
              mountPath: /secrets/tls/engine-raw
              readOnly: true
            - name: engine-tls-chain
              mountPath: /etc/firebolt/tls/engine
              readOnly: true
            {{- end }}
            {{- with $.Values.engineSpec.customVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            # Scratch space outside the read-only root filesystem.
            # `/run/firebolt` holds the engine's per-port unix
            # domain socket (`.s.firebolt.<port>`); the directory
            # is created by the volume mount and must be writable
            # since the root filesystem is read-only.
            - name: runtime
              mountPath: /run/firebolt
          securityContext:
            # Engine processes untrusted SQL; a code-execution exploit
            # under a writable root could persist binaries or rewrite
            # configs on the image layer. The chart's gateway, metadata,
            # and postgres containers all already enforce this — the
            # engine matching them closes the last writable-root gap.
            readOnlyRootFilesystem: true
            {{- if $.Values.engineSpec.podSecurityContext.runAsNonRoot }}
            runAsNonRoot: true
            runAsUser: 3473
            runAsGroup: 3473
            {{- end }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        {{- if $.Values.engineSpec.uiSidecar }}
        - name: core-ui
          image: {{ $.Values.engineSpec.uiSidecarImage.repository }}:{{ $.Values.engineSpec.uiSidecarImage.tag }}
          imagePullPolicy: {{ $.Values.engineSpec.uiSidecarImage.pullPolicy }}
          env:
            - name: FIREBOLT_CORE_URL
              # The sidecar's nginx reverse proxy defaults proxy_ssl_verify to off, so
              # proxying to the engine's self-signed/private-CA cert over loopback HTTPS
              # needs no extra trust configuration on this side.
              value: {{ if $.Values.tls.engine.enabled }}https{{ else }}http{{ end }}://localhost:3473
          ports:
            - containerPort: 9100
              name: web-ui
              protocol: TCP
          # Pod Ready must mean the UI actually serves: without a probe the
          # container counts ready the instant its process starts, so a
          # crash-looping UI flaps Service endpoints and can slip through a
          # rolling update on a transient ready window.
          readinessProbe:
            initialDelaySeconds: 1
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 3
            httpGet:
              path: /
              port: 9100
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 3473
            runAsGroup: 3473
          volumeMounts:
            - name: nginx-writable-dir
              mountPath: /var/tmp
            - name: nginx-writable-dir
              mountPath: /var/cache/nginx
            - name: nginx-writable-dir
              mountPath: /var/run/nginx
        {{- end }}
        {{- if and $.Values.engineSpec.memlockSetup $.Values.engineSpec.podSecurityContext.runAsNonRoot }}
        - name: memlock-setup
          image: {{ $.Values.utilitiesImage }}
          imagePullPolicy: {{ $.Values.engineSpec.image.pullPolicy }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 64Mi
          securityContext:
            runAsUser: 0
            capabilities:
              drop:
                - ALL
              add:
                - SYS_RESOURCE
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: FB_AWS_EC2_METADATA_CLIENT_ENABLED
              value: "true"
          command: ["/bin/bash", "-c"]
          args:
            - |
              {{- include "fbinstance.memlockSetupScript" $ | nindent 14 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/firebolt
        {{- end }}
{{- $hpEnabled := $.Values.engineSpec.hostPathStorageEnabled }}
{{- if or $.Values.engineSpec.customInitContainersTemplate $hpEnabled $.Values.tls.engine.enabled }}
      initContainers:
        {{- if $.Values.engineSpec.customInitContainersTemplate }}
        {{- tpl (toYaml $.Values.engineSpec.customInitContainersTemplate) $ | nindent 8 }}
        {{- end }}
        {{- if $.Values.tls.engine.enabled }}
        - name: tls-chain-setup
          # Builds the full certificate chain (leaf + issuing CA) the engine's
          # own `certificate_file` needs: its internal self-health-check uses
          # that same file as its curl trust bundle (CURLOPT_CAINFO), so a
          # leaf-only cert (e.g. cert-manager's tls.crt with the CA split into
          # a separate ca.crt) fails self-verification and the pod never
          # reaches Ready. A plain volume mount can't concatenate two Secret
          # keys into one file, hence the init container. `ca.crt` is a
          # required key in tls.engine's Secret (see values.yaml) — this
          # fails loudly and immediately if it's missing, rather than
          # silently shipping a leaf-only chain that fails self-verification
          # later with a much less obvious curl/SSL error.
          image: {{ $.Values.utilitiesImage }}
          imagePullPolicy: {{ $.Values.engineSpec.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "[Setup] building engine TLS certificate chain"
              cat /secrets/tls/engine-raw/tls.crt /secrets/tls/engine-raw/ca.crt > /etc/firebolt/tls/engine/fullchain.pem
          resources:
            limits:
              memory: 24Mi
            requests:
              cpu: 25m
              memory: 24Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 3473
            runAsGroup: 3473
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: engine-tls-raw
              mountPath: /secrets/tls/engine-raw
              readOnly: true
            - name: engine-tls-chain
              mountPath: /etc/firebolt/tls/engine
        {{- end }}
        {{- if $hpEnabled }}
        - name: host-path-setup
          image: {{ $.Values.utilitiesImage }}
          imagePullPolicy: {{ $.Values.engineSpec.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "[Setup] changing ownership of /var/lib/firebolt to UID 3473"
              chown -R 3473:3473 /var/lib/firebolt
          resources:
            limits:
              memory: 24Mi
            requests:
              cpu: 25m
              memory: 24Mi
          securityContext:
            runAsUser: 0
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
          volumeMounts:
            - name: data
              mountPath: /var/lib/firebolt
        {{- end }}
{{- end }}
      volumes:
        {{- if $.Values.engineSpec.uiSidecar }}
        - name: nginx-writable-dir
          emptyDir: {}
        {{- end }}
        - name: runtime
          emptyDir: {}
        - name: engine-config
          configMap:
            name: {{ include "fbinstance.fullname" $ }}-engine-{{ $engine.name }}-config
        {{- if $.Values.auth.enabled }}
        - name: auth-admin
          secret:
            secretName: {{ $authAdminSecret }}
        {{- range $ki, $secretName := $authSigningSecrets }}
        - name: auth-signing-{{ $ki }}
          secret:
            secretName: {{ $secretName }}
        {{- end }}
        {{- end }}
        {{- if $.Values.tls.engine.enabled }}
        - name: engine-tls-raw
          secret:
            secretName: {{ $engineTlsSecret }}
        - name: engine-tls-chain
          emptyDir: {}
        {{- end }}
        {{- with $.Values.engineSpec.customVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $hpEnabled }}
        - name: data
          hostPath:
            path: {{ $.Values.engineSpec.storageHostPath.path }}
            type: {{ default "DirectoryOrCreate" $.Values.engineSpec.storageHostPath.type }}
        {{- end }}
{{- if not $hpEnabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        {{- $storage := $engine.storage | default $.Values.engineSpec.defaultStorage }}
        accessModes: {{ toYaml $storage.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ $storage.resources.requests.storage }}
{{- end }}
{{- end }}
{{- end }}
