{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fbinstance.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: gateway
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener
          # per_connection_buffer_limit_bytes caps both downstream-receive
          # and upstream-send buffering on this listener AND is the budget
          # the router uses when deciding whether to BUFFER a request body
          # for retry: a request larger than this is dispatched without
          # buffering and any 503 it returns - including the retry-safe
          # X-Firebolt-Drained 503 from the engine's pre-work shutdown
          # fence - propagates to the client unretried.
          #
          # Hard-coded at 2 MiB to match the operator-managed deployment
          # path (firebolt-core-operator's gatewayPerConnectionBufferLimitBytes
          # in instance_gateway.go) so both paths render the same buffer.
          # Intentionally NOT a Helm value: the number sits inside two
          # invariants - (a) which requests can be retried under the
          # zero-downtime contract, and (b) gateway memory budget under
          # concurrent load. A per-install override invites settings that
          # silently break either. If 2 MiB is too small for your workload,
          # raise it in BOTH this chart and the operator at the same time
          # and audit gateway.replicas / gateway.resources.limits.memory
          # to absorb the new peak (~ concurrent_requests * (1 + retry_factor)
          # * buffer_limit).
          per_connection_buffer_limit_bytes: 2097152  # 2 MiB; see comment above.
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.gateway.containerPort }}
          filter_chains:
            - {{- if .Values.tls.gateway.enabled }}
              # Client → gateway TLS termination. tls.crt/tls.key are mounted
              # from the resolved tls.gateway Secret (BYO or cert-manager);
              # see gateway-deployment.yaml for the volume.
              transport_socket:
                name: envoy.transport_sockets.tls
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                  common_tls_context:
                    tls_certificates:
                      - certificate_chain:
                          filename: /etc/envoy/tls/gateway/tls.crt
                        private_key:
                          filename: /etc/envoy/tls/gateway/tls.key
              {{- end }}
              filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: gateway
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          # Structured format aimed at triaging 5xx during the retry/drain
                          # layer: RESPONSE_FLAGS (UH/UF/UC/UT/NR/LR/DPE/...) categorises the
                          # failure, RESPONSE_CODE_DETAILS pins the exact code path, and
                          # UPSTREAM_TRANSPORT_FAILURE_REASON surfaces TLS/TCP-level errors.
                          # Together they let us tell an Envoy-synthesized 5xx (safe to retry)
                          # apart from one returned by the engine (potentially side-effectful).
                          log_format:
                            text_format_source:
                              inline_string: |
                                [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%" %RESPONSE_CODE% flags=%RESPONSE_FLAGS% details=%RESPONSE_CODE_DETAILS% tx_fail=%UPSTREAM_TRANSPORT_FAILURE_REASON% upstream=%UPSTREAM_HOST% cluster=%UPSTREAM_CLUSTER% duration=%DURATION%ms rx=%BYTES_RECEIVED% tx=%BYTES_SENT% authority=%REQ(:AUTHORITY)% engine=%REQ(X-FIREBOLT-ENGINE)%
                    http_filters:
                      - name: envoy.filters.http.health_check
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                          pass_through_mode: false
                          headers:
                            - name: ":path"
                              string_match:
                                exact: "/healthz"
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          default_source_code:
                            inline_string: |
                              local function is_valid_engine(s)
                                if s == nil or #s == 0 or #s > 63 then return false end
                                if not string.match(s, "^[%l%d][-%l%d]*$") then return false end
                                if string.sub(s, -1) == "-" then return false end
                                return true
                              end

                              function envoy_on_request(handle)
                                local engine = handle:headers():get("x-firebolt-engine")
                                if not is_valid_engine(engine) then
                                  handle:respond({[":status"] = "400"}, "invalid or missing X-Firebolt-Engine header")
                                  return
                                end
                                -- TODO: remove advanced_mode once Core supports x-request-id
                                local path = handle:headers():get(":path")
                                if path:find("?", 1, true) then
                                  handle:headers():replace(":path", path .. "&advanced_mode=true")
                                else
                                  handle:headers():replace(":path", path .. "?advanced_mode=true")
                                end
                                -- Route to the engine's headless Service so Envoy resolves
                                -- per-pod IPs and load-balances across them itself.
                                handle:headers():replace(":authority", "{{ include "fbinstance.fullname" . }}-engine-" .. engine .. "-hl.{{ .Release.Namespace }}.svc.cluster.local:3473")
                              end
                      - name: envoy.filters.http.dynamic_forward_proxy
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                          # On-demand STRICT_DNS sub-cluster per engine authority.
                          # cluster_init_timeout only applies to the first request
                          # to a given engine; steady-state requests skip it.
                          sub_cluster_config:
                            cluster_init_timeout: 5s
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: default
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: dynamic_forward_proxy
                                timeout: 0s
                                # Retry contract:
                                #   - connect-failure / refused-stream / reset:
                                #     transport-level failures where the engine
                                #     could not have observed the request, so a
                                #     retry cannot duplicate side effects.
                                #   - retriable-headers (X-Firebolt-Drained):
                                #     a 503 produced by the engine's pre-work
                                #     shutdown fence (HTTPHandler::handleRequestImpl
                                #     fast-fails before any executor / Storage
                                #     Manager work). The fence sets this header
                                #     ONLY on that early-bail path, so retrying
                                #     is provably side-effect free. Without
                                #     this rule, a request that lands on a pod
                                #     between SIGTERM and the next health-check
                                #     ejection would propagate a 503 to the
                                #     client.
                                # We deliberately do NOT match bare 5xx: a
                                # 5xx returned by the engine after work has
                                # started may have applied side effects.
                                # IMPORTANT: a retry can only be issued when
                                # the entire request body fits in Envoy's
                                # per_connection_buffer_limit_bytes (1 MiB
                                # default). Larger requests are dispatched
                                # without buffering and propagate the 503 to
                                # the client even when the header is present.
                                # previous_hosts retry-host predicate keeps each
                                # retry off pod IPs already tried; with the
                                # STRICT_DNS sub-cluster it can sweep every pod
                                # behind the engine's headless Service. num_retries
                                # is set well above any single engine's pod count;
                                # short exponential back-off lets a DNS refresh or
                                # health-check ejection take effect between tries.
                                retry_policy:
                                  retry_on: connect-failure,refused-stream,reset,retriable-headers
                                  retriable_headers:
                                    - name: X-Firebolt-Drained
                                      present_match: true
                                  num_retries: 50
                                  retry_back_off:
                                    base_interval: 0.025s
                                    max_interval: 0.25s
                                  retry_host_predicate:
                                    - name: envoy.retry_host_predicates.previous_hosts
                                      typed_config:
                                        "@type": type.googleapis.com/envoy.extensions.retry.host.previous_hosts.v3.PreviousHostsPredicate
                                  host_selection_retry_max_attempts: 5
        - name: stats_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.gateway.metricsPort }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: stats
                    route_config:
                      name: stats_route
                      virtual_hosts:
                        - name: stats
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/stats/prometheus"
                              route:
                                cluster: admin_stats
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: dynamic_forward_proxy
          lb_policy: CLUSTER_PROVIDED
          {{- if .Values.tls.engine.enabled }}
          # Upstream TLS to engines. auto_sni/auto_san_validation (under
          # typed_extension_protocol_options, NOT the deprecated
          # Cluster.upstream_http_protocol_options field) derive SNI and the
          # expected SAN from the :authority the Lua filter rewrites
          # per-request — required because this is a dynamic_forward_proxy
          # cluster with one sub-cluster per engine authority, so a static
          # SNI/SAN would only ever validate against whichever engine
          # happened to be dialed first. trusted_ca is the engine's own CA
          # (ca.crt is a required key in tls.engine's Secret); this same
          # transport_socket also covers the active health_checks below,
          # since both hit the query port.
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              common_tls_context:
                validation_context:
                  trusted_ca:
                    filename: /etc/envoy/tls/engine-ca/ca.crt
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http_protocol_options: {}
              upstream_http_protocol_options:
                auto_sni: true
                auto_san_validation: true
          {{- end }}
          # Mirror the listener's per_connection_buffer_limit_bytes onto
          # the cluster so upstream connection buffering matches the
          # downstream limit. The router consults the smaller of the
          # two when deciding whether a retry's request body fits, so
          # raising one without the other has no effect on retry coverage.
          per_connection_buffer_limit_bytes: 2097152  # 2 MiB; see comment above.
          # Short connect budget so the retry loop moves past a black-holed
          # stale pod IP quickly instead of hanging on the kernel default.
          connect_timeout: 0.25s
          # One request per connection forces a fresh DNS lookup per query, so a
          # draining pod's IP stops receiving new streams within one connect.
          max_requests_per_connection: 1
          # Per-engine isolation: a misbehaving engine can't swamp the gateway
          # with unbounded connections, queue depth, in-flight streams, or
          # concurrent retries. A tripped breaker shows up as UO / UAEX / URX
          # in the access_log RESPONSE_FLAGS. Hardcoded — these sit at the
          # centre of the per-engine isolation contract; raise gateway.replicas
          # rather than tuning the caps.
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 1024
                max_pending_requests: 1024
                max_requests: 1024
                max_retries: 256
          # Active health checks on the query port: a pod that returns 503 on
          # /health/ready (which the engine does on SIGTERM) is ejected from the
          # load-balanced set within ~1s, so no new query lands on a draining pod.
          health_checks:
            - timeout: 0.5s
              interval: 1s
              # Probe idle sub-clusters at the same cadence as active ones; the
              # 60s default would defeat fast drain detection.
              no_traffic_interval: 1s
              healthy_threshold: 1
              unhealthy_threshold: 1
              http_health_check:
                path: /health/ready
          cluster_type:
            name: envoy.clusters.dynamic_forward_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
              # STRICT_DNS sub-cluster per authority resolves the engine's
              # headless Service to all pod IPs and load-balances across them —
              # what makes per-pod health checks and previous_hosts meaningful.
              sub_clusters_config:
                lb_policy: ROUND_ROBIN
                sub_cluster_ttl: 300s
        - name: admin_stats
          connect_timeout: 0.25s
          type: STATIC
          load_assignment:
            cluster_name: admin_stats
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: {{ .Values.gateway.adminPort }}
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: {{ .Values.gateway.adminPort }}
{{- end }}
