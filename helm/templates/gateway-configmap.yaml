{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fbinstance.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: gateway
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.gateway.containerPort }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: gateway
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                    http_filters:
                      - name: envoy.filters.http.health_check
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                          pass_through_mode: false
                          headers:
                            - name: ":path"
                              string_match:
                                exact: "/healthz"
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          default_source_code:
                            inline_string: |
                              local function is_valid_engine(s)
                                if s == nil or #s == 0 or #s > 63 then return false end
                                if not string.match(s, "^[%l%d][-%l%d]*$") then return false end
                                if string.sub(s, -1) == "-" then return false end
                                return true
                              end

                              function envoy_on_request(handle)
                                local engine = handle:headers():get("x-firebolt-engine")
                                if not is_valid_engine(engine) then
                                  handle:respond({[":status"] = "400"}, "invalid or missing X-Firebolt-Engine header")
                                  return
                                end
                                -- TODO: remove advanced_mode once Core supports x-request-id
                                local path = handle:headers():get(":path")
                                if path:find("?", 1, true) then
                                  handle:headers():replace(":path", path .. "&advanced_mode=true")
                                else
                                  handle:headers():replace(":path", path .. "?advanced_mode=true")
                                end
                                handle:headers():replace(":authority", engine .. "-service.{{ .Release.Namespace }}.svc.cluster.local:3473")
                              end
                      - name: envoy.filters.http.dynamic_forward_proxy
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                          dns_cache_config:
                            name: dynamic_forward_proxy_cache
                            dns_lookup_family: V4_ONLY
                            dns_refresh_rate: 1s
                            dns_failure_refresh_rate:
                              base_interval: 1s
                              max_interval: 5s
                            host_ttl: 5s
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: default
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: dynamic_forward_proxy
                                timeout: 0s
                                retry_policy:
                                  retry_on: connect-failure,refused-stream,reset
                                  num_retries: 2
        - name: stats_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.gateway.metricsPort }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: stats
                    route_config:
                      name: stats_route
                      virtual_hosts:
                        - name: stats
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/stats/prometheus"
                              route:
                                cluster: admin_stats
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: dynamic_forward_proxy
          lb_policy: CLUSTER_PROVIDED
          cluster_type:
            name: envoy.clusters.dynamic_forward_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
              dns_cache_config:
                name: dynamic_forward_proxy_cache
                dns_lookup_family: V4_ONLY
                dns_refresh_rate: 1s
                dns_failure_refresh_rate:
                  base_interval: 1s
                  max_interval: 5s
                host_ttl: 5s
        - name: admin_stats
          connect_timeout: 0.25s
          type: STATIC
          load_assignment:
            cluster_name: admin_stats
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: {{ .Values.gateway.adminPort }}
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: {{ .Values.gateway.adminPort }}
{{- end }}
