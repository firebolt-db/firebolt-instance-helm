{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fbinstance.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fbinstance.labels" . | nindent 4 }}
    firebolt/component: gateway
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener
          # per_connection_buffer_limit_bytes caps both downstream-receive
          # and upstream-send buffering on this listener AND is the budget
          # the router uses when deciding whether to BUFFER a request body
          # for retry: a request larger than this is dispatched without
          # buffering and any 503 it returns - including the retry-safe
          # X-Firebolt-Drained 503 from the engine's pre-work shutdown
          # fence - propagates to the client unretried.
          #
          # Hard-coded at 2 MiB to match the operator-managed deployment
          # path (firebolt-core-operator's gatewayPerConnectionBufferLimitBytes
          # in instance_gateway.go) so both paths render the same buffer.
          # Intentionally NOT a Helm value: the number sits inside two
          # invariants - (a) which requests can be retried under the
          # zero-downtime contract, and (b) gateway memory budget under
          # concurrent load. A per-install override invites settings that
          # silently break either. If 2 MiB is too small for your workload,
          # raise it in BOTH this chart and the operator at the same time
          # and audit gateway.replicas / gateway.resources.limits.memory
          # to absorb the new peak (~ concurrent_requests * (1 + retry_factor)
          # * buffer_limit).
          per_connection_buffer_limit_bytes: 2097152  # 2 MiB; see comment above.
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.gateway.containerPort }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: gateway
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                    http_filters:
                      - name: envoy.filters.http.health_check
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                          pass_through_mode: false
                          headers:
                            - name: ":path"
                              string_match:
                                exact: "/healthz"
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          default_source_code:
                            inline_string: |
                              local function is_valid_engine(s)
                                if s == nil or #s == 0 or #s > 63 then return false end
                                if not string.match(s, "^[%l%d][-%l%d]*$") then return false end
                                if string.sub(s, -1) == "-" then return false end
                                return true
                              end

                              function envoy_on_request(handle)
                                local engine = handle:headers():get("x-firebolt-engine")
                                if not is_valid_engine(engine) then
                                  handle:respond({[":status"] = "400"}, "invalid or missing X-Firebolt-Engine header")
                                  return
                                end
                                -- TODO: remove advanced_mode once Core supports x-request-id
                                local path = handle:headers():get(":path")
                                if path:find("?", 1, true) then
                                  handle:headers():replace(":path", path .. "&advanced_mode=true")
                                else
                                  handle:headers():replace(":path", path .. "?advanced_mode=true")
                                end
                                handle:headers():replace(":authority", engine .. "-service.{{ .Release.Namespace }}.svc.cluster.local:3473")
                              end
                      - name: envoy.filters.http.dynamic_forward_proxy
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                          dns_cache_config:
                            name: dynamic_forward_proxy_cache
                            dns_lookup_family: V4_ONLY
                            dns_refresh_rate: 1s
                            dns_failure_refresh_rate:
                              base_interval: 1s
                              max_interval: 5s
                            host_ttl: 5s
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: default
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: dynamic_forward_proxy
                                timeout: 0s
                                # Retry contract:
                                #   - connect-failure / refused-stream / reset:
                                #     transport-level failures where the engine
                                #     could not have observed the request, so a
                                #     retry cannot duplicate side effects.
                                #   - retriable-headers (X-Firebolt-Drained):
                                #     a 503 produced by the engine's pre-work
                                #     shutdown fence (HTTPHandler::handleRequestImpl
                                #     fast-fails before any executor / Storage
                                #     Manager work). The fence sets this header
                                #     ONLY on that early-bail path, so retrying
                                #     is provably side-effect free. Without
                                #     this rule, a request that lands on a pod
                                #     between SIGTERM and the next health-check
                                #     ejection would propagate a 503 to the
                                #     client.
                                # We deliberately do NOT match bare 5xx: a
                                # 5xx returned by the engine after work has
                                # started may have applied side effects.
                                # IMPORTANT: a retry can only be issued when
                                # the entire request body fits in Envoy's
                                # per_connection_buffer_limit_bytes (1 MiB
                                # default). Larger requests are dispatched
                                # without buffering and propagate the 503 to
                                # the client even when the header is present.
                                # previous_hosts retry-host predicate keeps
                                # the retry off the same upstream IP; it is
                                # a best-effort guard here because DFP in
                                # dns_cache_config mode collapses the host
                                # set to a single logical entry per authority.
                                retry_policy:
                                  retry_on: connect-failure,refused-stream,reset,retriable-headers
                                  retriable_headers:
                                    - name: X-Firebolt-Drained
                                      present_match: true
                                  num_retries: 2
                                  retry_host_predicate:
                                    - name: envoy.retry_host_predicates.previous_hosts
                                      typed_config:
                                        "@type": type.googleapis.com/envoy.extensions.retry.host.previous_hosts.v3.PreviousHostsPredicate
                                  host_selection_retry_max_attempts: 5
        - name: stats_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.gateway.metricsPort }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: stats
                    route_config:
                      name: stats_route
                      virtual_hosts:
                        - name: stats
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/stats/prometheus"
                              route:
                                cluster: admin_stats
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: dynamic_forward_proxy
          lb_policy: CLUSTER_PROVIDED
          # Mirror the listener's per_connection_buffer_limit_bytes onto
          # the cluster so upstream connection buffering matches the
          # downstream limit. The router consults the smaller of the
          # two when deciding whether a retry's request body fits, so
          # raising one without the other has no effect on retry coverage.
          per_connection_buffer_limit_bytes: 2097152  # 2 MiB; see comment above.
          cluster_type:
            name: envoy.clusters.dynamic_forward_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
              dns_cache_config:
                name: dynamic_forward_proxy_cache
                dns_lookup_family: V4_ONLY
                dns_refresh_rate: 1s
                dns_failure_refresh_rate:
                  base_interval: 1s
                  max_interval: 5s
                host_ttl: 5s
        - name: admin_stats
          connect_timeout: 0.25s
          type: STATIC
          load_assignment:
            cluster_name: admin_stats
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: {{ .Values.gateway.adminPort }}
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: {{ .Values.gateway.adminPort }}
{{- end }}
