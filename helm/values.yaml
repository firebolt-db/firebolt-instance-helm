---

# -- Registry credentials. Must be a pre-created docker-registry Secret in the
# deployment namespace. Leave empty if nodes have ambient registry access (e.g. node IAM role).
imagePullSecrets: []
# - name: regcred

# -- Extra labels applied to all resources and pods.
extraLabels:
  firebolt/product: core

# -- When true, a Namespace resource is included in the chart output.
# Pair with `helm install --create-namespace --set createNamespace=false`.
createNamespace: false

# @section -- Engine Defaults

# -- Shared engine pod defaults applied to all engines unless overridden per-engine.
# @default -- {}
engineSpec:
  image:
    # -- Container repository for the firebolt-core engine image.
    repository: ghcr.io/firebolt-db/engine
    # -- Image tag. Defaults to `Chart.appVersion` when empty.
    tag: ""
    # -- Image pull policy.
    pullPolicy: IfNotPresent

  # -- When true, a readiness probe is added to the core container.
  readiness: true

  # -- When true, a memlock-setup init container is added to configure memory locking limits.
  memlockSetup: false
  # -- Pod-level security context for engine pods.
  # @default -- {}
  podSecurityContext:
    # -- Reject the pod if any container runs as UID 0. Also gates the
    # chart's container-level `runAs*` defaults, memlock init, and the
    # entrypoint UID check.
    runAsNonRoot: true
    # -- Group applied to mounted volumes. Matches the engine UID/GID so
    # the data PVC is chowned on mount.
    fsGroup: 3473
    # -- When to re-apply `fsGroup` ownership. `OnRootMismatch` skips the
    # chown when already correct — much faster on large PVCs.
    fsGroupChangePolicy: OnRootMismatch
  # -- Termination grace period in seconds for engine pods. Sized to give
  # in-flight queries time to drain before SIGKILL during rolling updates
  # and node drains. Also rendered into the engine `config.yaml` as
  # `engine.termination_grace_period` with a 5s safety margin (floored at
  # 1s), so the engine's own in-flight-query wait stays below this value.
  terminationGracePeriodSeconds: 60
  # -- Service account name for engine pods.
  serviceAccount: default
  # -- Tolerations for engine pod scheduling.
  tolerations: []
  # -- Affinity rules for engine pod scheduling.
  affinity: {}
  # -- Node selector for engine pod scheduling.
  nodeSelector: {}

  # -- Deploy a Core UI sidecar for each engine pod.
  uiSidecar: false

  # -- Custom init containers injected into engine pods (supports templating).
  customInitContainersTemplate: []
  # Example:
  # customInitContainersTemplate:
  #   - name: custom-init
  #     image: busybox:latest
  #     command: ['sh', '-c', 'echo "Custom init container"']

  # -- Custom volumes injected into engine pods.
  customVolumes: []
  # Example:
  # customVolumes:
  #   - name: custom-config
  #     configMap:
  #       name: my-config

  # -- When true, uses hostPath instead of PVC for engine data.
  hostPathStorageEnabled: false
  # -- Host path configuration used when `hostPathStorageEnabled` is true.
  # @default -- {}
  storageHostPath:
    # -- Host path for engine data.
    path: /var/lib/firebolt-core
    # -- Host path type.
    type: DirectoryOrCreate

  # -- Suffix appended after `.svc` in node FQDNs in `config.yaml`.
  nodeHostSuffix: ".cluster.local"

  # -- Default PVC storage spec for engines. `storageClassName` is intentionally absent —
  # the cluster default storage class is used. Override here or per-engine to specify a class
  # (e.g. `storageClassName: gp3`).
  # @default -- {}
  defaultStorage:
    # -- Access modes for the default PVC.
    accessModes: [ReadWriteOnce]
    resources:
      requests:
        # -- Default storage size for engine PVCs.
        storage: 100Gi

# @section -- Metadata Service

# -- Metadata service (Pensieve) configuration.
# @default -- {}
metadata:
  image:
    # -- Container repository for the Pensieve metadata service image.
    repository: ghcr.io/firebolt-db/metadata
    # -- Pensieve image tag. Defaults to `Chart.appVersion` (kept in lockstep with the engine) when empty.
    # The template strips any `release-` or `debug-` prefix from `Chart.appVersion` when falling back,
    # since the pensieve release pipeline tags images without that prefix.
    # Override explicitly only when the metadata service must run a version other than the engine.
    tag: ""
    # -- Image pull policy.
    pullPolicy: IfNotPresent

  # -- Resource requests and limits for the metadata service container.
  # Pensieve is a lightweight gRPC service; increase memory if you run many engines.
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      memory: "1Gi"

  # -- gRPC server configuration for the metadata service.
  # @default -- {}
  server:
    # -- gRPC server listen address.
    host: "0.0.0.0"
    # -- gRPC server port.
    port: 7000
    # -- Number of server threads. `0` uses all available cores.
    threads: 0
    # -- Log level for the metadata service.
    log_level: "information"

  # -- Deployment-level settings for the metadata service.
  # @default -- {}
  deployment:
    # -- Termination grace period in seconds.
    terminationGracePeriodSeconds: 30
    # -- Pod-level security context.
    securityContext: {}

  # -- Pod template overrides for the metadata service (nodeSelector, tolerations, affinity).
  podTemplate: {}

# @section -- PostgreSQL

# -- PostgreSQL configuration. When `local_enabled: true` the chart deploys a single-replica
# `postgres:16-alpine` StatefulSet. Set `local_enabled: false` and supply connection details
# for an external database.
# @default -- {}
postgresql:
  # -- When true, deploys a bundled PostgreSQL StatefulSet. Set to false to use an external database.
  local_enabled: true
  # -- PostgreSQL image used for the bundled StatefulSet.
  image: "postgres:16-alpine"
  # -- PostgreSQL host. Auto-derived when `local_enabled` is true; must be set explicitly for external databases.
  host: ""
  # -- PostgreSQL port.
  port: 5432
  # -- Database name.
  database: firebolt_metadata
  # -- Database username.
  username: firebolt
  # -- Database password. Required when `local_enabled` is true.
  # For external databases, set here or use `postgresql.credentials.existingSecret`.
  password: ""
  # -- PostgreSQL schema.
  schema: "public"
  # -- Resource requests and limits for the bundled PostgreSQL container.
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  # -- TCP keepalive settings for the PostgreSQL connection.
  # @default -- {}
  keepalive:
    # -- Enable TCP keepalive (`1` = enabled).
    enabled: 1
    # -- Keepalive idle time in seconds.
    idle_sec: 120
    # -- Keepalive probe interval in seconds.
    interval_sec: 30
    # -- Maximum number of keepalive probes before dropping the connection.
    count: 5
  # -- Connection timeout in seconds.
  connect_timeout_sec: 5
  # -- PostgreSQL credentials Secret configuration.
  # @default -- {}
  credentials:
    # -- Mount path for the credentials Secret inside the metadata service container.
    mountPath: /secrets/postgres
    # -- Reference an externally-managed Secret (e.g. via ESO). When set, the chart will
    # not create its own Secret. Ignored when `postgresql.local_enabled` is true.
    existingSecret: ""
  # -- Persistence configuration for the bundled PostgreSQL StatefulSet.
  # @default -- {}
  persistence:
    # -- PVC size for bundled PostgreSQL data.
    size: 10Gi
# @section -- Gateway

# -- Envoy gateway proxy configuration. Routes queries to engine Services based on the
# `X-Firebolt-Engine` HTTP header. A Lua filter extracts the engine name and rewrites
# the upstream to `{engine}-service:3473` via dynamic forward proxy.
# @default -- {}
gateway:
  # -- Set to true to deploy the Envoy gateway proxy.
  enabled: true
  # -- Number of gateway replicas.
  replicas: 2
  # -- PodDisruptionBudget for gateway pods. Prevents node drains from
  # evicting all replicas at once.
  # @default -- {}
  pdb:
    # -- Emit a PodDisruptionBudget for the gateway. Set to `false` when
    # an external policy controller (Kyverno, OPA Gatekeeper, etc.) or a
    # cluster-wide PDB tool already manages disruption budgets, so the
    # chart's PDB does not conflict with theirs.
    enabled: true
    # -- Maximum gateway pods that may be unavailable simultaneously during
    # voluntary disruption. Mutually exclusive with `minAvailable` — set
    # one and leave the other `null`.
    maxUnavailable: 1
    # -- Minimum gateway pods that must remain available during voluntary
    # disruption. Mutually exclusive with `maxUnavailable`.
    minAvailable: null
  image:
    # -- Envoy proxy container image.
    repository: envoyproxy/envoy
    # -- Envoy image tag.
    tag: "v1.37.2"
    # -- Image pull policy.
    pullPolicy: IfNotPresent
  # -- Envoy listener port for client traffic.
  containerPort: 8080
  # -- Envoy admin interface port (used for health checks).
  adminPort: 9901
  # -- Resource requests and limits for the Envoy container.
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  # -- Gateway Service configuration.
  # @default -- {}
  service:
    # -- Service type. One of `ClusterIP`, `LoadBalancer`, or `NodePort`.
    type: ClusterIP
    # -- External service port proxied to `containerPort`.
    port: 80
  # -- Container port that exposes Envoy Prometheus metrics (/stats/prometheus).
  # A dedicated stats listener proxies requests to the Envoy admin on loopback.
  metricsPort: 9090
  # -- Pod template overrides for gateway pods. Only the keys listed below
  # are read by the chart; arbitrary [PodSpec](https://pkg.go.dev/k8s.io/api/core/v1#PodSpec)
  # fields supplied here are silently ignored. This mirrors the operator's
  # closed `ComponentSpec` schema.
  # @default -- {}
  podTemplate:
    # -- Node selector for gateway pod scheduling.
    nodeSelector: {}
    # -- Affinity rules for gateway pod scheduling.
    affinity: {}
    # -- Tolerations for gateway pod scheduling.
    tolerations: []
    # -- Topology spread constraints. With 2 default replicas, set this to
    # force zone or node spread so a single failure cannot take down both
    # gateway pods at once.
    topologySpreadConstraints: []
    # -- Pod priority class. Reference a `PriorityClass` to let the gateway
    # preempt lower-priority workloads when the cluster is under resource
    # pressure — useful when query routing must stay up during incidents.
    priorityClassName: ""

# @section -- Authentication

# -- Authentication configuration for firebolt-core `auth.json`.
# Not enforced yet; reserved for future engine-level auth propagation.
# TODO: wire auth fields into Envoy config or engine auth once supported.
# @default -- {}
auth:
  # -- Authentication mode. One of `none`, `local`, or `sso`.
  mode: none

  # -- Local authentication configuration. Used when `mode: local`.
  # @default -- {}
  local:
    # -- Name of a Secret containing username/password or API keys.
    credentialsSecretRef: ""

  # -- OIDC/SSO configuration. Used when `mode: sso`.
  # @default -- {}
  oidc:
    # -- OIDC issuer URL.
    issuerURL: ""
    # -- OIDC client ID.
    clientID: ""
    # -- Claim mappings for OIDC token fields.
    # @default -- {}
    claimMappings:
      # -- OIDC claim used as the username.
      username: "email"

# @section -- Engines

# -- Engine definitions. Each entry produces one StatefulSet per node (`replicas` controls
# node count), plus a shared headless Service, ClusterIP Service, and ConfigMap.
# Per-engine values override the shared `engineSpec` defaults.
# @default -- []
engines:
  - # -- Engine name. Used to derive resource names across the chart.
    name: default
    # -- Number of nodes in this engine group (one StatefulSet replica per node).
    replicas: 1
    # -- Resource requests and limits for engine containers.
    # Firebolt Core is memory-bound: more RAM directly improves cache hit rates and query
    # throughput. CPU governs parallel query execution threads.
    #
    # Typical sizing guidance:
    #   Development / functional testing:  2 vCPU  /  8 Gi  (request)
    #   Small production workload:         4 vCPU  / 32 Gi
    #   Medium production workload:        8 vCPU  / 64 Gi
    #   Large production workload:        16 vCPU  / 128 Gi
    #
    # Storage I/O is also significant — use an SSD-backed StorageClass and
    # size the PVC to hold your working dataset plus ~30 % headroom.
    resources:
      requests:
        cpu: "1"
        memory: "4Gi"
      limits:
        memory: "4Gi"
    # -- PVC storage configuration for this engine. Falls back to `engineSpec.defaultStorage` if omitted.
    storage:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 100Gi
    # -- Priority class name for engine pods.
    priorityClassName: ""
    # -- Tolerations for engine pod scheduling.
    tolerations: []
    # -- Affinity rules for engine pod scheduling.
    affinity: {}
    # -- Node selector for engine pod scheduling.
    nodeSelector: {}
    # -- Annotations applied to engine pods.
    podAnnotations: {}

# @section -- Global

# -- Custom engine configuration deep-merged into the rendered engine
# config.yaml at the root. The rendered document follows the Firebolt
# Core configuration schema (`schema_version: "1.0"`); user-supplied
# keys at the top of `customEngineConfig` become siblings of the
# chart-managed `engine:` and `instance:` blocks (e.g. `auth:`,
# `logging:`), and keys nested under `instance:` merge into the
# instance block (e.g. `instance.id`).
#
# Chart-authoritative paths are silently stripped from this input and
# cannot be overridden: `schema_version`, `engine.id`, `engine.nodes`,
# `instance.type`, and `instance.multi_engine`.
# @default -- {}
customEngineConfig:
  # -- Instance identity. `id` propagates internally to `account_id`,
  # `account_name`, `organization_id`, and `organization_name`, so the
  # chart only needs to set the ULID once.
  # @default -- {}
  instance:
    # -- ULID for the Firebolt instance. Must match the account
    # reconciled by Dedicated Pensieve at startup (the metadata
    # service template uses this same value for
    # `pensieve_lite.default_account_id`).
    id: "01KP98J0000000000000000000"

# -- PodMonitor configuration for Prometheus metrics scraping.
# Requires the Prometheus Operator CRDs to be installed.
# @default -- {}
podMonitor:
  # -- Create a PodMonitor for engine pods (port 9090, /metrics).
  engines:
    enabled: false
    interval: 15s
  # -- Create a PodMonitor for gateway pods (/stats/prometheus).
  gateway:
    enabled: false
    interval: 15s

# -- Image used for utility init/sidecar containers (e.g. the memlock-setup sidecar).
utilitiesImage: debian:stable-slim
