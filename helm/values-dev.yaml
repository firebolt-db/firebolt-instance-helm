---
# Overlay for inner-loop development: pins engine and metadata to the mutable
# `:dev` tag of their default public `ghcr.io/firebolt-db` repositories, and
# points managed storage at the local floci S3 emulator. Use `make dev`.
# Not for reproducible installs.
#
#   make dev
#   helm install firebolt ./helm -f helm/values-dev.yaml

engineSpec:
  image:
    tag: dev

metadata:
  image:
    tag: dev

# Point the engine's managed storage at the local floci S3 emulator. The engine
# refuses to start in dedicated-Pensieve mode without managed storage on object
# storage. Apply local-floci.yaml in the same namespace before `make install`.
customEngineConfig:
  storage:
    managed_table_storage: s3
    managed_table_bucket_name: firebolt-managed
    aws:
      endpoint: http://floci.firebolt.svc.cluster.local:4566
      path_style_addressing: true # non-AWS S3-compatible store; ignored for AWS S3
